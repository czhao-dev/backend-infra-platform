server:
  listen_addr: ":8080"
  read_timeout: "5s"
  write_timeout: "10s"
  shutdown_timeout: "5s"

load_balancer:
  strategy: "round_robin"
  max_retries: 2
  backend_timeout: "2s"

health_check:
  enabled: true
  path: "/healthz"
  interval: "2s"
  timeout: "500ms"
  unhealthy_threshold: 2
  healthy_threshold: 2

backends:
  - name: "orchestrator-1"
    url: "http://orchestrator-1:8080"
    weight: 1

  - name: "orchestrator-2"
    url: "http://orchestrator-2:8080"
    weight: 1

  - name: "orchestrator-3"
    url: "http://orchestrator-3:8080"
    weight: 1

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"
